name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run bash integration tests
        run: bash tests/test_claudectl.sh

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run bash integration tests
        run: bash tests/test_claudectl.sh

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      # The full unit suite runs under BOTH PowerShell versions: pwsh 7 and Windows
      # PowerShell 5.1. The production entry point (claudectl.cmd) runs the script via
      # `powershell` (5.1), which reads a no-BOM .ps1 as Windows-1252 — so non-ASCII in
      # a string breaks parsing there but not under pwsh 7. Testing both is mandatory.
      - name: Unit suite under pwsh 7
        shell: pwsh
        run: pwsh -NoProfile -File tests/test_claudectl.ps1
      - name: Unit suite under Windows PowerShell 5.1 (production path) + parse guard
        shell: powershell
        run: |
          $e = $null; $t = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Join-Path $PWD 'scripts\claudectl.ps1'), [ref]$t, [ref]$e) | Out-Null
          if ($e) { $e | ForEach-Object { Write-Host "::error::claudectl.ps1:$($_.Extent.StartLineNumber) $($_.Message)" }; exit 1 }
          powershell -NoProfile -File tests/test_claudectl.ps1
      - name: Smoke harness under Windows PowerShell 5.1
        shell: powershell
        run: powershell -NoProfile -File tests/smoke.ps1
