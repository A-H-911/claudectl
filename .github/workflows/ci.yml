name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run bash integration tests
        run: bash tests/test_claudectl.sh

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run bash integration tests
        run: bash tests/test_claudectl.sh

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run PowerShell integration tests (pwsh 7)
        shell: pwsh
        run: pwsh -File tests/test_claudectl.ps1
      # The production entry point (claudectl.cmd) runs claudectl.ps1 under Windows
      # PowerShell 5.1, NOT pwsh 7. 5.1 reads a no-BOM .ps1 as Windows-1252, so any
      # non-ASCII byte in a string breaks parsing. This step guards that real path:
      # parse-check + the smoke harness, which invokes the script via `powershell` (5.1).
      - name: Smoke test under Windows PowerShell 5.1 (production .cmd path)
        shell: powershell
        run: |
          $e = $null; $t = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Join-Path $PWD 'scripts\claudectl.ps1'), [ref]$t, [ref]$e) | Out-Null
          if ($e) { $e | ForEach-Object { Write-Host "::error::claudectl.ps1:$($_.Extent.StartLineNumber) $($_.Message)" }; exit 1 }
          powershell -NoProfile -File tests/smoke.ps1
