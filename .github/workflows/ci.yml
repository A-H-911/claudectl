name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bash integration tests
        run: bash tests/test_claudectl.sh

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bash integration tests
        run: bash tests/test_claudectl.sh

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PowerShell integration tests
        shell: pwsh
        run: pwsh -File tests/test_claudectl.ps1
