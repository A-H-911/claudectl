<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
  </defs>
  <!-- Three arc segments — isolated instances sharing a core -->
  <circle cx="40" cy="40" r="36" fill="none" stroke="url(#grad-dark)" stroke-width="6"
          stroke-dasharray="56 18" stroke-dashoffset="0" stroke-linecap="round"/>
  <circle cx="40" cy="40" r="24" fill="none" stroke="url(#grad-dark)" stroke-width="5"
          stroke-dasharray="37 13" stroke-dashoffset="6" stroke-linecap="round" opacity="0.7"/>
  <!-- Central diamond — shared binary -->
  <polygon points="40,24 52,40 40,56 28,40" fill="url(#grad-dark)" opacity="0.9"/>
  <polygon points="40,30 46,40 40,50 34,40" fill="#1e1b4b" opacity="0.9"/>
</svg>
